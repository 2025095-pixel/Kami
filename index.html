<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>【禁忌の融合界】カオス・インデックス</title>
    <style>
        /* 漆黒の結界（CSS） */
        body { 
            background-color: #000; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            text-align: center; 
            margin-top: 20%; 
            overflow: hidden;
        }
        .aura { 
            text-shadow: 0 0 15px #0f0; 
            font-size: 2.5em; 
            transition: all 1s ease;
        }
    </style>
</head>
<body>
    <h1 class="aura" id="chant">深淵より目覚めよ、三位一体の神言……</h1>

    <script type="text/forbidden-csharp" id="holy-csharp">
        using System;

        namespace AbsolutePower
        {
            public class UltimateChimera
            {
                public static void Unleash()
                {
                    // ククク…これがC#の力だ
                    Console.WriteLine("【極大消滅呪文】俺の右腕が疼く……ッ！C#の力がブラウザに顕現する！");
                }
            }
        }
    </script>

    <script>
        // 運命の刻（ロード完了）を待つ
        window.onload = () => {
            const chant = document.getElementById('chant');
            
            // C#の魂をDOMから強制抽出
            const csharpSoul = document.getElementById('holy-csharp').textContent;
            
            setTimeout(() => {
                // 現実世界の崩壊エフェクト
                chant.innerText = "【警告】異なる次元の言語（C#）がブラウザ内で衝突しています！";
                chant.style.color = "#f00";
                chant.style.textShadow = "0 0 20px #f00";
                document.body.style.backgroundColor = "#200";
                
                // 開発者ツール（深淵）への直接出力
                console.log("%c▼ 禁断のC#コードが抽出されました ▼", "color: red; font-size: 18px; font-weight: bold;");
                console.log("%c" + csharpSoul, "color: cyan; font-style: italic;");
                console.log("%c※注釈：現世のブラウザでは直接コンパイルできないため、JSの魔力でコンソールの海に『概念』として顕現させた……！", "color: yellow;");
                
            }, 2500); // 2.5秒後に発動
        };
    </script>
</body>
</html>
